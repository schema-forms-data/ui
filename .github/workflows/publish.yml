name: Publish to npm

on:
  push:
    branches:
      - main

permissions:
  contents: read
  id-token: write

concurrency:
  group: publish-main
  cancel-in-progress: false

jobs:
  publish:
    name: Build & Publish
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22.x
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check if version already published
        id: version_check
        run: |
          PKG_NAME=$(node -p "require('./package.json').name")
          PKG_VERSION=$(node -p "require('./package.json').version")
          if npm view "${PKG_NAME}@${PKG_VERSION}" version 2>/dev/null | grep -q "${PKG_VERSION}"; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "ℹ️  ${PKG_NAME}@${PKG_VERSION} já existe no npm — skip."
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
            echo "🚀 Nova versão: ${PKG_NAME}@${PKG_VERSION}"
          fi

      - name: Build
        if: steps.version_check.outputs.skip == 'false'
        run: pnpm build

      - name: Publish to npm
        if: steps.version_check.outputs.skip == 'false'
        run: pnpm publish --no-git-checks --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
